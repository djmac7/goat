# Curated pool as a GRID (§5, §9). Team and Year are INDEPENDENT axes:
#   - franchises  = the team axis (brand: name + color), keyed by the Basketball-Reference
#                   abbreviation as it appears in the raw CSVs.
#   - seasons     = the year axis (season END year).
# 05_curate.py crosses them: every (season, franchise) cell that has >= `min_roster`
# qualifying players becomes a playable roster (top players by minutes). Cells where the
# franchise didn't exist / lacked a roster that year are simply omitted, so Reroll Team
# (new franchise, same year) and Reroll Year (new year, same franchise) only ever land on
# legal rosters. Ratings are ranked against the whole universe, so editing the pool never
# re-rates anyone (§0 rule 2).

roster_size: 10            # players kept per (season, franchise) cell (main spec: 8-12)
min_roster: 8             # a cell needs >= this many qualifying players to be playable

# franchise display + brand color, keyed by the abbreviation used in `team` (the team axis)
franchises:
  CHI: { name: "Bulls",    color: "#CE1141" }
  GSW: { name: "Warriors", color: "#1D428A" }
  LAL: { name: "Lakers",   color: "#552583" }
  SAS: { name: "Spurs",    color: "#000000" }
  BOS: { name: "Celtics",  color: "#007A33" }
  MIA: { name: "Heat",     color: "#98002E" }
  HOU: { name: "Rockets",  color: "#CE1141" }
  DAL: { name: "Mavericks",color: "#00538C" }
  TOR: { name: "Raptors",  color: "#CE1141" }
  DET: { name: "Pistons",  color: "#C8102E" }
  PHO: { name: "Suns",     color: "#E56020" }
  MIL: { name: "Bucks",    color: "#00471B" }
  DEN: { name: "Nuggets",  color: "#0E2240" }
  PHI: { name: "76ers",    color: "#006BB6" }
  NYK: { name: "Knicks",   color: "#F58426" }
  UTA: { name: "Jazz",     color: "#002B5C" }

# the year axis — iconic seasons spanning the eras (crossed with every franchise above)
seasons: [1986, 1987, 1989, 1991, 1994, 1996, 1998, 2001, 2003, 2004,
          2008, 2011, 2013, 2014, 2016, 2017, 2019, 2021, 2023, 2024]
